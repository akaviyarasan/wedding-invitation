<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kaviyarasan & Sowmiya Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌹 Romantic Background */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: url('YOUR_IMAGE.jpg') no-repeat center/cover;
    height: 100vh;
    color: white;
}

/* 🌑 Overlay for readability */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* ✨ Fade Animation */
.fade-in {
    animation: fadeIn 2s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px);}
    to { opacity: 1; transform: translateY(0);}
}

/* 💖 Header */
.header {
    text-align: center;
    padding: 60px 20px 20px;
}

.title {
    font-family: 'Great Vibes', cursive;
    font-size: 48px;
    color: #ffd700;
}

.names {
    font-size: 32px;
    margin-top: 15px;
    font-weight: 600;
}

/* 💎 Glass Cards */
.container {
    padding: 20px;
    text-align: center;
}

.card {
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 20px;
    margin: 15px auto;
    max-width: 400px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

/* 🌟 Headings */
.heading {
    color: #ffd700;
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 18px;
}

/* 📍 Map */
.map iframe {
    border-radius: 12px;
    margin-top: 10px;
}

/* 📱 WhatsApp Button */
.whatsapp {
    display: inline-block;
    margin-top: 25px;
    padding: 14px 25px;
    background: linear-gradient(45deg, #25D366, #128C7E);
    color: white;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

/* ✨ Footer */
.footer {
    margin: 25px;
    font-size: 14px;
    opacity: 0.9;
}

</style>
</head>

<body class="fade-in">

<!-- 💖 Header -->
<div class="header">
    <div class="title">Together With Their Families</div>
    <div class="names">
        Kaviyarasan A <br> & <br> Sowmiya S
    </div>
</div>

<!-- 💎 Content -->
<div class="container">

    <div class="card">
        <div class="heading">Reception</div>
        <p>📅 06 June 2026</p>
        <p>🕰 6:00 PM – 9:00 PM</p>
    </div>

    <div class="card">
        <div class="heading">Wedding</div>
        <p>📅 07 June 2026</p>
        <p>🕰 4:30 AM – 5:30 AM</p>
    </div>

    <div class="card">
        <div class="heading">Venue</div>
        <p>Somasundara Mahal, Tiruppur</p>

        <div class="map">
            <iframe 
                src="https://maps.google.com/maps?q=Somasundara%20Mahal%20Tiruppur&z=15&output=embed"
                width="100%" height="200" style="border:0;">
            </iframe>
        </div>
    </div>

    <!-- 📱 WhatsApp RSVP -->
    <a class="whatsapp" 
       href="https://wa.me/91XXXXXXXXXX?text=We%20are%20excited%20to%20attend%20your%20wedding%20💐"
       target="_blank">
       💌 RSVP on WhatsApp
    </a>

    <div class="footer">
        With love, we invite you to celebrate our special day 💖
    </div>

</div>

</body>
</html>
