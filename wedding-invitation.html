<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kaviyarasan & Sowmiya Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* 🌹 Background */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: url('YOUR_IMAGE.jpg') no-repeat center/cover;
    color: white;
}

/* 🌑 Dark overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* 💞 Floating Hearts */
.heart {
    position: fixed;
    bottom: -10px;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* 🪔 Gold animated border */
body {
    border: 5px solid transparent;
    border-image: linear-gradient(45deg, gold, #ffdf80, gold) 1;
    animation: borderGlow 3s infinite;
}

@keyframes borderGlow {
    0% { border-image-source: linear-gradient(45deg, gold, #ffdf80); }
    50% { border-image-source: linear-gradient(45deg, #fff2b3, gold); }
    100% { border-image-source: linear-gradient(45deg, gold, #ffdf80); }
}

/* 💖 Header */
.header {
    text-align: center;
    padding: 60px 20px 20px;
}

.title {
    font-family: 'Great Vibes', cursive;
    font-size: 48px;
    color: gold;
}

.names {
    font-size: 32px;
    margin-top: 15px;
}

/* 💎 Cards */
.container {
    padding: 20px;
    text-align: center;
}

.card {
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    margin: 15px auto;
    max-width: 400px;
}

/* 📸 Gallery */
.gallery {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
}

.gallery img {
    width: 200px;
    border-radius: 15px;
}

/* 📱 Buttons */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 20px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

.whatsapp { background: #25D366; }
.calendar { background: #ff9800; }
.mapbtn { background: #2196F3; }

.footer {
    margin: 20px;
}

</style>
</head>

<body>

<!-- 💞 Hearts Script -->
<script>
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 500);
</script>

<!-- 💖 Header -->
<div class="header">
    <div class="title">Together With Their Families</div>
    <div class="names">
        Kaviyarasan A <br> & <br> Sowmiya S
    </div>
</div>

<!-- 💎 Content -->
<div class="container">

    <div class="card">
        <h3>Reception</h3>
        <p>📅 06 June 2026</p>
        <p>🕰 6:00 PM – 9:00 PM</p>
    </div>

    <div class="card">
        <h3>Wedding</h3>
        <p>📅 07 June 2026</p>
        <p>🕰 4:30 AM – 5:30 AM</p>
    </div>

    <div class="card">
        <h3>Venue</h3>
        <p>Somasundara Mahal, Tiruppur</p>

        <!-- 🧭 Live Navigation -->
        <a class="btn mapbtn"
           href="https://www.google.com/maps/search/?api=1&query=Somasundara+Mahal+Tiruppur"
           target="_blank">
           📍 Open in Maps
        </a>
    </div>

    <!-- 📸 Photo Gallery -->
    <div class="card">
        <h3>Our Moments 💞</h3>
        <div class="gallery">
            <img src="photo1.jpg">
            <img src="photo2.jpg">
            <img src="photo3.jpg">
        </div>
    </div>

    <!-- 📅 Calendar Button -->
    <a class="btn calendar"
       href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Wedding%20Kaviyarasan%20%26%20Sowmiya&dates=20260607T043000/20260607T053000&details=Wedding%20Ceremony&location=Somasundara%20Mahal%20Tiruppur"
       target="_blank">
       📅 Save to Calendar
    </a>

    <!-- 📱 WhatsApp -->
    <a class="btn whatsapp"
       href="https://wa.me/91XXXXXXXXXX?text=We%20will%20attend%20your%20wedding%20💐"
       target="_blank">
       💌 RSVP
    </a>

    <div class="footer">
        With love, we invite you 💖
    </div>

</div>

</body>
</html>
