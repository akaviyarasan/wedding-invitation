<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaviyarasan & Sowmiya Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #fdf6e3, #f3e0b5);
    color: #4b2e2e;
    overflow-x: hidden;
}

/* 🪔 Scroll opening */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #3b2f2f;
    color: gold;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 10;
    animation: fadeOut 2s ease 3s forwards;
}

.overlay h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 40px;
}

@keyframes fadeOut {
    to {
        opacity: 0;
        visibility: hidden;
    }
}

/* 🏛 Temple style header */
.header {
    text-align: center;
    padding: 20px;
    background: url('https://i.imgur.com/6Iej2c3.png') no-repeat center;
    background-size: contain;
}

.title {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    color: #b8860b;
}

.names {
    font-size: 30px;
    margin: 15px 0;
    font-weight: 600;
}

/* 💎 Cards */
.container {
    padding: 20px;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.8);
    border: 2px solid #d4af37;
    border-radius: 20px;
    padding: 20px;
    margin: 15px 0;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.heading {
    color: #b8860b;
    font-weight: 600;
    margin-bottom: 10px;
}

/* 📍 Map */
.map iframe {
    border-radius: 15px;
}

/* 📱 WhatsApp button */
.whatsapp {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 20px;
    background: #25D366;
    color: white;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
}

/* ✨ Footer */
.footer {
    margin: 20px;
}
</style>
</head>

<body>

<!-- 🪔 Opening Animation -->
<div class="overlay">
    <h1>You're Invited 💌</h1>
    <p>Tap to Enter</p>
</div>

<!-- 🏛 Header -->
<div class="header">
    <div class="title">The Wedding Of</div>
    <div class="names">
        Kaviyarasan A <br> & <br> Sowmiya S
    </div>
</div>

<!-- 💎 Content -->
<div class="container">

    <div class="card">
        <div class="heading">Reception</div>
        <p>📅 06 June 2026</p>
        <p>🕰 6:00 PM – 9:00 PM</p>
    </div>

    <div class="card">
        <div class="heading">Wedding</div>
        <p>📅 07 June 2026</p>
        <p>🕰 4:30 AM – 5:30 AM</p>
    </div>

    <div class="card">
        <div class="heading">Venue</div>
        <p>Somasundara Mahal, Tiruppur</p>

        <div class="map">
            <iframe 
                src="https://maps.google.com/maps?q=Somasundara%20Mahal%20Tiruppur&z=15&output=embed"
                width="100%" height="200" style="border:0;">
            </iframe>
        </div>
    </div>

    <!-- 📱 WhatsApp RSVP -->
    <a class="whatsapp" 
       href="https://wa.me/91XXXXXXXXXX?text=I%20will%20attend%20your%20wedding%20💐"
       target="_blank">
       RSVP on WhatsApp
    </a>

    <div class="footer">
        We request the honour of your presence & blessings 🙏
    </div>

</div>

</body>
</html>
