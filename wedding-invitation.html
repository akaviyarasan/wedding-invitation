<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaviyarasan & Sowmiya Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f8f3e8, #f1e4c3);
    color: #4b2e2e;
    overflow-x: hidden;
}

/* ✨ Soft gold floating circles */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(212,175,55,0.2);
    animation: float 10s infinite ease-in-out;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-40px); }
    100% { transform: translateY(0px); }
}

/* 📱 Container */
.container {
    padding: 20px;
    text-align: center;
}

/* 💎 Card */
.card {
    background: rgba(255,255,255,0.7);
    border: 1px solid #d4af37;
    border-radius: 20px;
    padding: 20px;
    margin: 15px 0;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* 🎀 Title */
.title {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    color: #b8860b;
}

/* 💑 Names */
.names {
    font-size: 30px;
    margin: 15px 0;
    font-weight: 600;
}

/* 🏷 Headings */
.heading {
    color: #b8860b;
    font-weight: 600;
    margin-bottom: 10px;
}

/* 📍 Map */
.map iframe {
    border-radius: 15px;
}

/* ✨ Footer */
.footer {
    margin-top: 20px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="background" id="bg"></div>

<div class="container">

    <div class="title">The Wedding Of</div>

    <div class="names">
        Kaviyarasan A <br> & <br> Sowmiya S
    </div>

    <div class="card">
        <div class="heading">Reception</div>
        <p>📅 06 June 2026</p>
        <p>🕰 6:00 PM – 9:00 PM</p>
    </div>

    <div class="card">
        <div class="heading">Wedding</div>
        <p>📅 07 June 2026</p>
        <p>🕰 4:30 AM – 5:30 AM</p>
    </div>

    <div class="card">
        <div class="heading">Venue</div>
        <p>Somasundara Mahal, Tiruppur</p>

        <div class="map">
            <iframe 
                src="https://maps.google.com/maps?q=Somasundara%20Mahal%20Tiruppur&z=15&output=embed"
                width="100%" height="200" style="border:0;">
            </iframe>
        </div>
    </div>

    <div class="footer">
        We request the honour of your presence & blessings ✨
    </div>

</div>

<script>
/* ✨ Floating golden circles */
const bg = document.getElementById("bg");

for (let i = 0; i < 15; i++) {
    let c = document.createElement("div");
    c.className = "circle";
    let size = Math.random() * 120 + 60;
    c.style.width = size + "px";
    c.style.height = size + "px";
    c.style.left = Math.random() * 100 + "vw";
    c.style.top = Math.random() * 100 + "vh";
    c.style.animationDuration = (8 + Math.random() * 5) + "s";
    bg.appendChild(c);
}
</script>

</body>
</html>
